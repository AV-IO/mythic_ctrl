{{define "head"}}
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mythic Ctrl</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
{{end}}

{{define "nav"}}
<header class="topbar">
  <div class="brand">Mythic&nbsp;Ctrl</div>
  <nav>
    <a href="/" class="{{if eq .Active "dashboard"}}active{{end}}">Dashboard</a>
    <a href="/config" class="{{if eq .Active "config"}}active{{end}}">Config</a>
    <a href="/logs" class="{{if eq .Active "logs"}}active{{end}}">Logs</a>
    <a href="/install" class="{{if eq .Active "install"}}active{{end}}">Install</a>
    <a href="/volumes" class="{{if eq .Active "volumes"}}active{{end}}">Volumes</a>
    <a href="/backup" class="{{if eq .Active "backup"}}active{{end}}">Backup</a>
  </nav>
  <form method="post" action="/logout" class="logout">
    <button type="submit">Log out</button>
  </form>
</header>
<div id="toast-zone" aria-live="polite"></div>
{{end}}

{{define "scripts"}}
<script>
  // Render a toast safely (text only, no HTML injection).
  function showToast(level, msg) {
    var zone = document.getElementById("toast-zone");
    if (!zone) { return; }
    var div = document.createElement("div");
    div.className = "toast toast-" + level;
    div.textContent = msg;
    zone.innerHTML = "";
    zone.appendChild(div);
    setTimeout(function () { if (zone.firstChild === div) { zone.innerHTML = ""; } }, 6000);
  }

  // Copy-to-clipboard for elements carrying data-copy (e.g. connection URIs).
  // Delegated so it works for content swapped in by htmx too.
  document.body.addEventListener("click", function (e) {
    var el = e.target.closest("[data-copy]");
    if (!el) { return; }
    // For services exposed on all interfaces, the URI carries a {HOST} token —
    // fill it with the host we're currently browsing so the copied URI is
    // reachable from here (127.0.0.1 would not be). Kept in sync with
    // hostPlaceholder in connection.go.
    var text = el.getAttribute("data-copy").split("{HOST}").join(window.location.hostname);
    function ok() { showToast("ok", "Copied to clipboard"); }
    function fail() { showToast("error", "Could not copy to clipboard"); }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(ok, fail);
    } else {
      // Fallback for non-secure contexts where the Clipboard API is unavailable.
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); ok(); } catch (err) { fail(); }
      document.body.removeChild(ta);
    }
  });

  // Auto-clear toasts that arrive via a normal swap.
  document.body.addEventListener("htmx:afterSwap", function (e) {
    if (e.target && e.target.id === "toast-zone") {
      setTimeout(function () { e.target.innerHTML = ""; }, 6000);
    }
  });

  // htmx does NOT swap non-2xx responses by default, so without this a 500
  // would look like "nothing happened". Surface server + network errors.
  document.body.addEventListener("htmx:responseError", function (e) {
    var xhr = e.detail.xhr;
    var body = (xhr.responseText || "").trim().slice(0, 300);
    showToast("error", "Request failed (" + xhr.status + ")" + (body ? ": " + body : ""));
  });
  document.body.addEventListener("htmx:sendError", function () {
    showToast("error", "Network error — could not reach the server.");
  });
  document.body.addEventListener("htmx:timeout", function () {
    showToast("warn", "Request timed out — the operation may still be running.");
  });
</script>
{{end}}
